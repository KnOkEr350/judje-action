services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    # RAM-диск для PostgreSQL
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  student-app:
    image: ${IMAGE_SOLUTION}
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/appdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/ping')\""]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  judge:
    image: ${IMAGE_JUDGE}
    volumes:
      - .:/app/reports
    environment:
      BASE_URL: http://student-app:8080
      ASSIGNMENT_TYPE: ${ASSIGNMENT_TYPE}
    depends_on:
      student-app:
        condition: service_healthy