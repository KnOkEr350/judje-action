name: 'Judge Action'
description: 'Runs judge tests against a student Docker image'

inputs:
  image:
    description: 'Student Docker image name'
    required: true
  judge_image:
    description: 'Judge Docker image'
    required: false
    default: 'knoker123/my-judge:v1'

runs:
  using: 'composite'
  steps:
    - name: Run judge
      shell: bash
      env:
        IMAGE_SOLUTION: ${{ inputs.image }}
        IMAGE_JUDGE: ${{ inputs.judge_image }}
      run: |
        docker compose -f ${{ github.action_path }}/docker-compose.yml up \
          --abort-on-container-exit \
          --exit-code-from judge

    - name: Cleanup containers
      if: always()
      shell: bash
      run: |
        docker compose -f ${{ github.action_path }}/docker-compose.yml down -v --remove-orphans